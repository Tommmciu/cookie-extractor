name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Extensions
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build Safari Extension
        run: |
          cd src/safari/SafariCookieExtractor
          xcodebuild -scheme SafariCookieExtractor -configuration Release -derivedDataPath build/Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
          
      - name: Archive Safari app
        run: |
          cd src/safari/SafariCookieExtractor/build/Release
          zip -r ../../../SafariCookieExtractor.app.zip Build/Products/Release/SafariCookieExtractor.app

      - name: Upload Safari artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-extension
          path: src/safari/SafariCookieExtractor.app.zip
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Conventional Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version-file: 'package.json'
          version-path: 'version'
          create-summary: true
          skip-on-empty: false

      - name: Download Safari artifact
        uses: actions/download-artifact@v4
        with:
          name: safari-extension

      - name: Create GitHub Release
        if: steps.changelog.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          files: SafariCookieExtractor.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
