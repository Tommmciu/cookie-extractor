<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Extractor</title>
    <style>
        body {
            width: 300px;
            padding: 12px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            margin: 0;
        }
        .status {
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            margin-bottom: 8px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div id="status" class="status info">Click "Copy Cookies" to extract cookies for this page</div>
    <button id="copyButton">Copy Cookies</button>
    <script src="popup.js"></script>
</body>
</html>
